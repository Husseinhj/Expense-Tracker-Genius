<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="accessibility_meta_title">Accessibility — Expense Tracker Genius</title>
  <meta name="description" data-i18n="accessibility_meta_description" data-i18n-attr="content" content="Accessibility information for Expense Tracker Genius iOS app">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
  <script defer src="js/components.js"></script>
  <script defer src="js/i18n.js"></script>
</head>
<body data-page="accessibility">
  <div id="site-header"></div>

  <main class="page-shell">
    <section class="section-sm">
      <div class="container-narrow">
        <div class="page-intro fade-in">
          <div class="page-icon">♿</div>
          <h1 class="page-title"><span class="gradient-text" data-i18n="Accessibility">Accessibility</span></h1>
          <p class="page-meta"><span data-i18n="Last Updated">Last Updated</span>: <span data-i18n="updated_date">March 2026</span></p>
        </div>

        <div class="article-list">
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">❤️</div><h2 class="article-section-title" data-i18n="Our Commitment">Our Commitment</h2></div><div class="article-section-content" data-i18n-content="acc_commitment"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🗣️</div><h2 class="article-section-title" data-i18n="VoiceOver">VoiceOver</h2></div><div class="article-section-content" data-i18n-content="acc_voiceover"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🔤</div><h2 class="article-section-title" data-i18n="Dynamic Type">Dynamic Type</h2></div><div class="article-section-content" data-i18n-content="acc_dynamic_type"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🌙</div><h2 class="article-section-title" data-i18n="Dark Mode">Dark Mode</h2></div><div class="article-section-content" data-i18n-content="acc_dark_mode"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🎨</div><h2 class="article-section-title" data-i18n="Color & Contrast">Color & Contrast</h2></div><div class="article-section-content" data-i18n-content="acc_color_contrast"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">✋</div><h2 class="article-section-title" data-i18n="Reduce Motion">Reduce Motion</h2></div><div class="article-section-content" data-i18n-content="acc_reduce_motion"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🎙️</div><h2 class="article-section-title" data-i18n="Voice Control & Siri">Voice Control & Siri</h2></div><div class="article-section-content" data-i18n-content="acc_voice_control"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">🌍</div><h2 class="article-section-title" data-i18n="Localization & RTL">Localization & RTL</h2></div><div class="article-section-content" data-i18n-content="acc_localization"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">⌚</div><h2 class="article-section-title" data-i18n="Apple Watch & Widgets">Apple Watch & Widgets</h2></div><div class="article-section-content" data-i18n-content="acc_watch_widgets"></div></article>
          <article class="article-section card fade-in"><div class="article-section-header"><div class="article-section-icon">💬</div><h2 class="article-section-title" data-i18n="Feedback">Feedback</h2></div><div class="article-section-content" data-i18n-content="acc_feedback"></div></article>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          }
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.fade-in').forEach((element) => observer.observe(element));
    });
  </script>
</body>
</html>
