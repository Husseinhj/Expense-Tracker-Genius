<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker Genius</title>
  <meta name="description" content="Smart expense tracking with AI insights, receipt scanning, budgets, and more. Privacy-first — no servers, all on-device.">
  <style>
    :root {
      --brand-primary: #7C3AED;
      --brand-secondary: #EC4899;
      --bg-primary: #0F0F14;
      --bg-card: rgba(255,255,255,0.04);
      --border-card: rgba(255,255,255,0.08);
      --text-primary: #F1F1F6;
      --text-secondary: #A1A1B5;
      --text-tertiary: #6B6B80;
      --radius: 16px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #F8F8FC;
        --bg-card: rgba(0,0,0,0.02);
        --border-card: rgba(0,0,0,0.08);
        --text-primary: #1A1A2E;
        --text-secondary: #4A4A65;
        --text-tertiary: #8888A0;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 480px; padding: 40px 24px; text-align: center; }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 {
      font-size: 32px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { color: var(--text-secondary); font-size: 16px; margin-bottom: 36px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border-card);
      text-decoration: none; color: var(--text-primary);
      transition: all 0.2s;
    }
    .link-card:hover {
      border-color: var(--brand-primary);
      transform: translateY(-1px);
    }
    .link-icon { font-size: 24px; width: 32px; text-align: center; }
    .link-text { text-align: left; }
    .link-title { font-size: 15px; font-weight: 600; }
    .link-desc { font-size: 13px; color: var(--text-tertiary); }
    .footer { margin-top: 40px; color: var(--text-tertiary); font-size: 13px; }
    .footer a { color: var(--brand-primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💰</div>
    <h1>Expense Tracker Genius</h1>
    <p class="tagline">Smart expense tracking. Privacy-first.</p>
    <div class="links">
      <a href="privacy.html" class="link-card">
        <span class="link-icon">🔒</span>
        <div class="link-text">
          <div class="link-title">Privacy Policy</div>
          <div class="link-desc">How we protect your data</div>
        </div>
      </a>
      <a href="terms.html" class="link-card">
        <span class="link-icon">📄</span>
        <div class="link-text">
          <div class="link-title">Terms of Use</div>
          <div class="link-desc">Usage terms and conditions</div>
        </div>
      </a>
      <a href="mailto:hussein.juybari@gmail.com" class="link-card">
        <span class="link-icon">✉️</span>
        <div class="link-text">
          <div class="link-title">Support</div>
          <div class="link-desc">hussein.juybari@gmail.com</div>
        </div>
      </a>
    </div>
    <div class="footer">
      © 2026 Expense Tracker Genius
    </div>
  </div>
</body>
</html>
